<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mini Budget Tracker</title>
  <link rel="stylesheet" href="style.css">
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- Chart.js for graphs -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header>
    <h1>Mini Budget Tracker</h1>
    <nav>
      <button data-section="dashboard" class="active">Dashboard</button>
      <button data-section="transactions">Transactions</button>
      <button data-section="goals">Goals</button>
      <button data-section="budgets">Budgets</button>
    </nav>
  </header>

  <!-- Dashboard -->
  <div id="dashboard" class="section">
    <div class="card" id="main-goal-tracker" style="display:none;"></div>
    <div class="card">
      <h2>Add Transaction</h2>
      <form id="transaction-form">
        <input type="number" id="amount" placeholder="Amount (R)" required>
        <input type="text" id="description" placeholder="Description" required>
        <input type="text" id="category" placeholder="Category">
        <select id="type">
          <option value="income">Income</option>
          <option value="expense">Expense</option>
          <option value="savings">Savings</option>
        </select>
        <button type="submit">Add</button>
      </form>
    </div>

    <div class="card balance">
      Balance: R<span id="balance">0</span>
    </div>

    <div class="card">
      <h2>Summary</h2>
      <p>Total Income: R<span id="income">0</span></p>
      <p>Total Expenses: R<span id="expenses">0</span></p>
      <p>Total Savings: R<span id="savings">0</span></p>
      <p>Transactions: <span id="count">0</span></p>
    </div>

    <div class="card">
      <h2>Expenses by Category</h2>
      <canvas id="categoryChart"></canvas>
    </div>
  </div>

  <!-- Transactions -->
  <div id="transactions" class="section" style="display:none;">
    <div class="card">
      <h2>Transactions</h2>
      <table id="transactions-table">
        <thead>
          <tr>
            <th>Type</th>
            <th>Amount (R)</th>
            <th>Description</th>
            <th>Category</th>
            <th></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- Goals -->
  <div id="goals" class="section" style="display:none;">
    <div class="card">
      <h2>Savings Goals</h2>
      <form id="goal-form">
        <input type="text" id="goal-name" placeholder="Goal name (e.g. Holiday)" required>
        <input type="number" id="goal-amount" placeholder="Target amount (R)" required>
        <button type="submit">Add Goal</button>
      </form>
      <div id="goals-list"></div>
    </div>
  </div>

  <!-- Budgets -->
  <div id="budgets" class="section" style="display:none;">
    <div class="card">
      <h2>Budget Buckets</h2>
      <form id="budget-form">
        <input type="text" id="budget-name" placeholder="Budget name (e.g. Bond)" required>
        <input type="number" id="budget-target" placeholder="Target amount (R)" required>
        <button type="submit">Add Budget</button>
      </form>
      <div id="budgets-list"></div>
    </div>
  </div>
</body>
<!-- App scripts -->
<script src="budgetTracker.js"></script>
<script src="test.js"></script>
</html>
